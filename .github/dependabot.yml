version: 2
updates:
# Maintain GitHub Actions version pins.
# Docker base image (nginx) is tracked by check_nginx_update.yml instead,
# which gives more control over mainline vs. stable selection.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
    open-pull-requests-limit: 10
