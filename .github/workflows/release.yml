name: "release"

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes. Leave blank to auto-generate from merged PRs. Provide text to prepend before auto-generated notes, or check 'override' to use only what you write here."
        required: false
        default: ""
      override_notes:
        description: "Override auto-generated notes entirely (use only the notes above)"
        type: boolean
        default: false
      skip_security_scan:
        description: "Skip vulnerability scan gate (emergency hotfix — requires reviewer approval)"
        type: boolean
        default: false

permissions:
  contents: write
  security-events: write
  issues: write
  pull-requests: write

jobs:
  resolve_tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      lego: ${{ steps.resolve.outputs.lego }}
      nginx: ${{ steps.resolve.outputs.nginx }}
      revision: ${{ steps.resolve.outputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve tag
        id: resolve
        run: |
          lego=$(grep -m1 '^ARG LEGO_VERSION=' src/Dockerfile | cut -d= -f2)
          nginx=$(grep -m1 '^FROM nginx:' src/Dockerfile | sed 's/FROM nginx://')
          base="lego${lego}-nginx${nginx}"

          if git ls-remote --tags origin | grep -q "refs/tags/${base}$"; then
            rev=1
            while git ls-remote --tags origin | grep -q "refs/tags/${base}-r${rev}$"; do
              rev=$((rev + 1))
            done
            tag="${base}-r${rev}"
          else
            tag="$base"
            rev=""
          fi

          echo "lego=$lego"       >> $GITHUB_OUTPUT
          echo "nginx=$nginx"     >> $GITHUB_OUTPUT
          echo "revision=$rev"    >> $GITHUB_OUTPUT
          echo "tag=$tag"         >> $GITHUB_OUTPUT
          echo "Resolved tag: $tag"

      - name: Create and push tag
        run: |
          git tag "${{ steps.resolve.outputs.tag }}"
          git push origin "${{ steps.resolve.outputs.tag }}"

  integration_check:
    name: "Integration test (DNS-01 staging cert)"
    needs: resolve_tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Debian image (amd64)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          load: true
          tags: docker-nginx-lego:integration-test

      - name: Create credentials directory
        run: mkdir -p /tmp/lego-test-creds

      - name: Write FreeMyIP credentials
        run: |
          cat > /tmp/lego-test-creds/freemyip.ini << 'EOF'
          FREEMYIP_TOKEN=${{ secrets.FREEMYIP_TOKEN }}
          EOF

      - name: Write FreeMyIP nginx config
        run: |
          mkdir -p /tmp/lego-test-conf
          cat > /tmp/lego-test-conf/freemyip.conf << EOF
          server {
              listen 443 ssl;
              server_name ${{ vars.FREEMYIP_DOMAIN }};
              ssl_certificate     /etc/letsencrypt/live/${{ vars.FREEMYIP_CERT_NAME }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${{ vars.FREEMYIP_CERT_NAME }}/privkey.pem;
              location / { return 200 "ok"; add_header Content-Type text/plain; }
          }
          EOF

      - name: Run container and request staging cert
        id: run_container
        run: |
          docker run -d \
            --name nginx-lego-test \
            -e CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }} \
            -e STAGING=1 \
            -e RENEWAL_INTERVAL=9999d \
            -e CERTBOT_DNS_CREDENTIALS_DIR=/etc/letsencrypt/credentials \
            -v /tmp/lego-test-creds:/etc/letsencrypt/credentials:ro \
            -v /tmp/lego-test-conf:/etc/nginx/user_conf.d:ro \
            -v lego-test-certs:/etc/letsencrypt \
            -p 8080:80 \
            -p 8443:443 \
            docker-nginx-lego:integration-test
          for i in $(seq 1 18); do
            sleep 5
            if docker exec nginx-lego-test test -f /etc/letsencrypt/live/${{ vars.FREEMYIP_CERT_NAME }}/fullchain.pem 2>/dev/null; then
              echo "cert_obtained=true" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting for cert... attempt $i/18"
          done

      - name: Verify certificate obtained
        run: |
          if [ "${{ steps.run_container.outputs.cert_obtained }}" != "true" ]; then
            echo "Certificate was not obtained within timeout"
            docker logs nginx-lego-test
            exit 1
          fi
          echo "Certificate obtained successfully"

      - name: Print container logs
        if: always()
        run: docker logs nginx-lego-test || true

      - name: Cleanup
        if: always()
        run: |
          docker stop nginx-lego-test || true
          docker rm nginx-lego-test || true
          docker volume rm lego-test-certs || true

  scan_debian:
    name: "Scan Debian image for vulnerabilities"
    needs: [resolve_tag, integration_check]
    if: ${{ !inputs.skip_security_scan }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Debian amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          load: true
          pull: true
          push: false
          tags: scan-target:debian

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Debian image (block on CRITICAL/HIGH)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format table \
            scan-target:debian

  scan_alpine:
    name: "Scan Alpine image for vulnerabilities"
    needs: [resolve_tag, integration_check]
    if: ${{ !inputs.skip_security_scan }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Alpine amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-alpine
          platforms: linux/amd64
          load: true
          pull: true
          push: false
          tags: scan-target:alpine

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Alpine image (block on CRITICAL/HIGH)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format table \
            scan-target:alpine

  scan_ubuntu:
    name: "Scan Ubuntu image for vulnerabilities"
    needs: [resolve_tag, integration_check]
    if: ${{ !inputs.skip_security_scan }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Ubuntu amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-ubuntu
          platforms: linux/amd64
          load: true
          pull: true
          push: false
          tags: scan-target:ubuntu

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Ubuntu image (block on CRITICAL/HIGH)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format table \
            scan-target:ubuntu

  docker_buildx_debian:
    needs: [resolve_tag, integration_check, scan_debian, scan_alpine, scan_ubuntu]
    if: |
      always() &&
      needs.resolve_tag.result == 'success' &&
      needs.integration_check.result == 'success' &&
      (needs.scan_debian.result == 'success' || needs.scan_debian.result == 'skipped') &&
      (needs.scan_alpine.result == 'success' || needs.scan_alpine.result == 'skipped') &&
      (needs.scan_ubuntu.result == 'success' || needs.scan_ubuntu.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 90
    steps:
      - name: Log dependency results
        run: |
          echo "resolve_tag:       ${{ needs.resolve_tag.result }}"
          echo "integration_check: ${{ needs.integration_check.result }}"
          echo "scan_debian:       ${{ needs.scan_debian.result }}"
          echo "scan_alpine:       ${{ needs.scan_alpine.result }}"
          echo "scan_ubuntu:       ${{ needs.scan_ubuntu.result }}"

      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_RELEASE_TOKEN }}

      - name: Compute Debian tags
        id: tags
        run: |
          BASE="emulator/docker-nginx-lego"
          L="${{ needs.resolve_tag.outputs.lego }}"
          N="${{ needs.resolve_tag.outputs.nginx }}"
          R="${{ needs.resolve_tag.outputs.revision }}"
          {
            echo 'value<<EOF'
            [ -n "$R" ] && echo "${BASE}:lego${L}-nginx${N}-r${R}"
            echo "${BASE}:lego${L}-nginx${N}"
            echo "${BASE}:lego${L}"
            echo "${BASE}:latest"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build and push all Debian images
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: |
            linux/amd64
            linux/386
            linux/arm64
            linux/arm/v7
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.tags.outputs.value }}

  docker_buildx_alpine:
    needs: [resolve_tag, integration_check, scan_debian, scan_alpine, scan_ubuntu]
    if: |
      always() &&
      needs.resolve_tag.result == 'success' &&
      needs.integration_check.result == 'success' &&
      (needs.scan_debian.result == 'success' || needs.scan_debian.result == 'skipped') &&
      (needs.scan_alpine.result == 'success' || needs.scan_alpine.result == 'skipped') &&
      (needs.scan_ubuntu.result == 'success' || needs.scan_ubuntu.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 45
    steps:
      - name: Log dependency results
        run: |
          echo "resolve_tag:       ${{ needs.resolve_tag.result }}"
          echo "integration_check: ${{ needs.integration_check.result }}"
          echo "scan_debian:       ${{ needs.scan_debian.result }}"
          echo "scan_alpine:       ${{ needs.scan_alpine.result }}"
          echo "scan_ubuntu:       ${{ needs.scan_ubuntu.result }}"

      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_RELEASE_TOKEN }}

      - name: Compute Alpine tags
        id: tags
        run: |
          BASE="emulator/docker-nginx-lego"
          L="${{ needs.resolve_tag.outputs.lego }}"
          N="${{ needs.resolve_tag.outputs.nginx }}"
          R="${{ needs.resolve_tag.outputs.revision }}"
          {
            echo 'value<<EOF'
            [ -n "$R" ] && echo "${BASE}:lego${L}-nginx${N}-r${R}-alpine"
            echo "${BASE}:lego${L}-nginx${N}-alpine"
            echo "${BASE}:lego${L}-alpine"
            echo "${BASE}:latest-alpine"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build and push all Alpine images
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-alpine
          platforms: |
            linux/amd64
            linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.tags.outputs.value }}

  docker_buildx_ubuntu:
    needs: [resolve_tag, integration_check, scan_debian, scan_alpine, scan_ubuntu]
    if: |
      always() &&
      needs.resolve_tag.result == 'success' &&
      needs.integration_check.result == 'success' &&
      (needs.scan_debian.result == 'success' || needs.scan_debian.result == 'skipped') &&
      (needs.scan_alpine.result == 'success' || needs.scan_alpine.result == 'skipped') &&
      (needs.scan_ubuntu.result == 'success' || needs.scan_ubuntu.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 45
    steps:
      - name: Log dependency results
        run: |
          echo "resolve_tag:       ${{ needs.resolve_tag.result }}"
          echo "integration_check: ${{ needs.integration_check.result }}"
          echo "scan_debian:       ${{ needs.scan_debian.result }}"
          echo "scan_alpine:       ${{ needs.scan_alpine.result }}"
          echo "scan_ubuntu:       ${{ needs.scan_ubuntu.result }}"

      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_RELEASE_TOKEN }}

      - name: Compute Ubuntu tags
        id: tags
        run: |
          BASE="emulator/docker-nginx-lego"
          L="${{ needs.resolve_tag.outputs.lego }}"
          N="${{ needs.resolve_tag.outputs.nginx }}"
          R="${{ needs.resolve_tag.outputs.revision }}"
          {
            echo 'value<<EOF'
            [ -n "$R" ] && echo "${BASE}:lego${L}-nginx${N}-r${R}-ubuntu"
            echo "${BASE}:lego${L}-nginx${N}-ubuntu"
            echo "${BASE}:lego${L}-ubuntu"
            echo "${BASE}:latest-ubuntu"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build and push all Ubuntu images
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-ubuntu
          platforms: |
            linux/amd64
            linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.tags.outputs.value }}

  release_gate:
    name: "Release gate"
    needs: [resolve_tag, integration_check, scan_debian, scan_alpine, scan_ubuntu, docker_buildx_debian, docker_buildx_alpine, docker_buildx_ubuntu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Log all job results
        run: |
          echo "resolve_tag:          ${{ needs.resolve_tag.result }}"
          echo "integration_check:    ${{ needs.integration_check.result }}"
          echo "scan_debian:          ${{ needs.scan_debian.result }}"
          echo "scan_alpine:          ${{ needs.scan_alpine.result }}"
          echo "scan_ubuntu:          ${{ needs.scan_ubuntu.result }}"
          echo "docker_buildx_debian: ${{ needs.docker_buildx_debian.result }}"
          echo "docker_buildx_alpine: ${{ needs.docker_buildx_alpine.result }}"
          echo "docker_buildx_ubuntu: ${{ needs.docker_buildx_ubuntu.result }}"
      - name: Check all builds succeeded
        run: |
          if [ "${{ needs.resolve_tag.result }}"          != "success" ] || \
             [ "${{ needs.docker_buildx_debian.result }}" != "success" ] || \
             [ "${{ needs.docker_buildx_alpine.result }}" != "success" ] || \
             [ "${{ needs.docker_buildx_ubuntu.result }}" != "success" ]; then
            echo "Release blocked: one or more required jobs did not succeed"
            exit 1
          fi
          echo "All required builds succeeded — proceeding to GitHub release"

  github_release:
    needs: [resolve_tag, release_gate]
    if: needs.release_gate.result == 'success'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub release (auto-generated notes)
        if: inputs.notes == '' && !inputs.override_notes
        run: |
          gh release create "${{ needs.resolve_tag.outputs.tag }}" \
              --title "${{ needs.resolve_tag.outputs.tag }}" \
              --generate-notes \
              --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release (prepend custom notes)
        if: inputs.notes != '' && !inputs.override_notes
        run: |
          prev_tag=$(git tag --sort=-creatordate | grep -v "^${{ needs.resolve_tag.outputs.tag }}$" | head -1)
          if [ -n "$prev_tag" ]; then
            generated=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ needs.resolve_tag.outputs.tag }}" \
              -f previous_tag_name="$prev_tag" \
              --jq '.body')
          else
            generated=""
          fi
          body="${{ inputs.notes }}"
          [ -n "$generated" ] && body="${body}"$'\n\n'"${generated}"
          gh release create "${{ needs.resolve_tag.outputs.tag }}" \
              --title "${{ needs.resolve_tag.outputs.tag }}" \
              --notes "$body" \
              --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release (override notes)
        if: inputs.override_notes
        run: |
          gh release create "${{ needs.resolve_tag.outputs.tag }}" \
              --title "${{ needs.resolve_tag.outputs.tag }}" \
              --notes "${{ inputs.notes }}" \
              --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: emulator/docker-nginx-lego
          readme-filepath: ./docs/dockerhub_description.md

      - name: Summary
        run: |
          echo "### Released ${{ needs.resolve_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve_tag.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Hub: \`emulator/docker-nginx-lego:${{ needs.resolve_tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY

  post_release_report:
    name: "Post-release vulnerability report"
    needs: [resolve_tag, github_release]
    if: always() && needs.github_release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan released images
        run: |
          BASE="emulator/docker-nginx-lego"
          trivy image --ignorefile .trivyignore --format json --output trivy-debian.json  "${BASE}:latest"
          trivy image --ignorefile .trivyignore --format json --output trivy-alpine.json  "${BASE}:latest-alpine"
          trivy image --ignorefile .trivyignore --format json --output trivy-ubuntu.json  "${BASE}:latest-ubuntu"

      - name: Build step summary
        if: always()
        run: |
          TAG="${{ needs.resolve_tag.outputs.tag }}"
          echo "## Vulnerability Report — ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for VARIANT in debian alpine ubuntu; do
            echo "### ${VARIANT}" >> $GITHUB_STEP_SUMMARY
            if [ -f "trivy-${VARIANT}.json" ]; then
              COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "trivy-${VARIANT}.json" || echo 0)
              CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "trivy-${VARIANT}.json" || echo 0)
              HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "trivy-${VARIANT}.json" || echo 0)
              echo "Total findings: ${COUNT} | Critical: ${CRIT} | High: ${HIGH}" >> $GITHUB_STEP_SUMMARY
            else
              echo "Scan output not available" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

      - name: Create or update GitHub Issues for new CVEs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve_tag.outputs.tag }}
        run: |
          TODAY=$(date +%Y-%m-%d)

          ALL_CVES=$(for VARIANT in debian alpine ubuntu; do
            [ -f "trivy-${VARIANT}.json" ] || continue
            jq -r '.Results[]?.Vulnerabilities[]? |
              select(.Severity == "CRITICAL" or .Severity == "HIGH") |
              .VulnerabilityID' "trivy-${VARIANT}.json"
          done | sort -u)

          if [ -z "$ALL_CVES" ]; then
            echo "No CRITICAL/HIGH CVEs found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "$ALL_CVES" | while read -r CVE_ID; do
            [ -z "$CVE_ID" ] && continue
            AFFECTED=""
            FIX_VERSIONS=""
            SEVERITY=""
            PKG=""
            for VARIANT in debian alpine ubuntu; do
              [ -f "trivy-${VARIANT}.json" ] || continue
              ROW=$(jq -r --arg cve "$CVE_ID" '
                .Results[]?.Vulnerabilities[]? |
                select(.VulnerabilityID == $cve and (.Severity == "CRITICAL" or .Severity == "HIGH")) |
                "\(.Severity)\t\(.PkgName)\t\(.FixedVersion // "unknown")"
              ' "trivy-${VARIANT}.json" | head -1)
              [ -z "$ROW" ] && continue
              SEVERITY=$(echo "$ROW" | cut -f1)
              PKG=$(echo "$ROW" | cut -f2)
              FIXED=$(echo "$ROW" | cut -f3)
              AFFECTED="${AFFECTED} ${VARIANT}"
              FIX_VERSIONS="${FIX_VERSIONS} ${VARIANT}:${FIXED}"
            done
            [ -z "$AFFECTED" ] && continue

            EXISTING=$(gh issue list --repo "$REPO" --label security \
              --search "${CVE_ID}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --repo "$REPO" \
                --body "Last seen in release \`${TAG}\` (${TODAY}). Affected images:${AFFECTED}. Fix versions:${FIX_VERSIONS}."
            else
              TITLE="[SECURITY] ${CVE_ID}: ${PKG} (${SEVERITY})"
              BODY="**CVE:** ${CVE_ID}
          **Severity:** ${SEVERITY}
          **Package:** ${PKG}
          **Detected in release:** \`${TAG}\`
          **Affected images:**${AFFECTED}
          **Fix versions:**${FIX_VERSIONS}

          To suppress if accepted: add to \`.trivyignore\`:
          \`\`\`
          ${CVE_ID}  # reason
          \`\`\`"
              gh issue create --repo "$REPO" \
                --title "$TITLE" \
                --body "$BODY" \
                --label security
            fi
          done

  cleanup:
    name: "Revert release on failure or cancellation"
    needs: [resolve_tag, release_gate, docker_buildx_debian, docker_buildx_alpine, docker_buildx_ubuntu]
    if: failure() || cancelled()
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Delete git tag
        run: |
          TAG="${{ needs.resolve_tag.outputs.tag }}"
          [ -z "$TAG" ] && { echo "No tag to delete"; exit 0; }
          git push origin --delete "$TAG" || echo "Tag $TAG not found or already deleted"

      - name: Delete Docker Hub tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_RELEASE_TOKEN }}
        run: |
          L="${{ needs.resolve_tag.outputs.lego }}"
          N="${{ needs.resolve_tag.outputs.nginx }}"
          R="${{ needs.resolve_tag.outputs.revision }}"
          [ -z "$L" ] && { echo "No tag outputs available — nothing to clean up on Docker Hub"; exit 0; }
          BASE="emulator/docker-nginx-lego"
          token=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | grep -o '"token":"[^"]*"' | sed 's/"token":"//;s/"//')
          TAGS="lego${L}-nginx${N} lego${L} latest lego${L}-nginx${N}-alpine lego${L}-alpine latest-alpine lego${L}-nginx${N}-ubuntu lego${L}-ubuntu latest-ubuntu"
          [ -n "$R" ] && TAGS="lego${L}-nginx${N}-r${R} lego${L}-nginx${N}-r${R}-alpine lego${L}-nginx${N}-r${R}-ubuntu ${TAGS}"
          for TAG in $TAGS; do
            echo -n "Deleting ${BASE}:${TAG} ... "
            curl -s -o /dev/null -w "%{http_code}\n" -X DELETE \
              "https://hub.docker.com/v2/repositories/${BASE}/tags/${TAG}/" \
              -H "Authorization: Bearer ${token}" || true
          done
