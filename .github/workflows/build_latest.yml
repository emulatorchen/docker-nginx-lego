name: "build-latest"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "master"
    paths:
      - "src/**"
  pull_request:
    branches:
      - "main"
      - "master"

permissions:
  contents: read
  security-events: write  # upload SARIF to GitHub Security tab

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            dockerfiles:
              - "src/Dockerfile*"

  docker_buildx_debian:
    needs: changes
    if: needs.changes.outputs.dockerfiles == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: false

      - name: Build Debian amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: scan-target:debian

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Debian image
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-debian.sarif \
            scan-target:debian

      - name: Upload Debian SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c # v4.34.1
        with:
          sarif_file: trivy-debian.sarif
          category: trivy-debian

      - name: Build Debian image (validate only)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: |
            linux/amd64
            linux/386
            linux/arm64
            linux/arm/v7
          push: false
          tags: emulator/docker-nginx-lego:latest

  docker_buildx_alpine:
    needs: changes
    if: needs.changes.outputs.dockerfiles == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: false

      - name: Build Alpine amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-alpine
          platforms: linux/amd64
          load: true
          push: false
          tags: scan-target:alpine

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Alpine image
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-alpine.sarif \
            scan-target:alpine

      - name: Upload Alpine SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c # v4.34.1
        with:
          sarif_file: trivy-alpine.sarif
          category: trivy-alpine

      - name: Build Alpine image (validate only)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-alpine
          platforms: |
            linux/amd64
            linux/arm64
          push: false
          tags: emulator/docker-nginx-lego:latest-alpine

  docker_buildx_ubuntu:
    needs: changes
    if: needs.changes.outputs.dockerfiles == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@55e939ef196646234a12c245e3414879e3580f01 # v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@1ef57f66f3e2960c64983b9ee94e155d466500e1 # v2.0.0
        with:
          should_login: false

      - name: Build Ubuntu amd64 image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-ubuntu
          platforms: linux/amd64
          load: true
          push: false
          tags: scan-target:ubuntu

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan Ubuntu image
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-ubuntu.sarif \
            scan-target:ubuntu

      - name: Upload Ubuntu SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c # v4.34.1
        with:
          sarif_file: trivy-ubuntu.sarif
          category: trivy-ubuntu

      - name: Build Ubuntu image (validate only)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-ubuntu
          platforms: |
            linux/amd64
            linux/arm64
          push: false
          tags: emulator/docker-nginx-lego:latest-ubuntu

  build_status:
    name: "Build status"
    needs: [docker_buildx_debian, docker_buildx_alpine, docker_buildx_ubuntu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.docker_buildx_debian.result }}" = "failure" ] || \
             [ "${{ needs.docker_buildx_alpine.result }}" = "failure" ] || \
             [ "${{ needs.docker_buildx_ubuntu.result }}" = "failure" ]; then
            exit 1
          fi
