name: "build-tags"

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "lego[0-9]*.[0-9]*.[0-9]*-nginx[1-9]*.[0-9]*.[0-9]*"

jobs:
  docker_buildx_debian:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@v2.0.0
        with:
          should_login: ${{ github.event_name != 'pull_request' }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version numbers from GitHub reference
        run: bash .github/version_extractor.sh ${GITHUB_REF} >> $GITHUB_ENV

      - name: Compute Debian tags
        id: tags
        run: |
          BASE="emulator/docker-nginx-lego"
          L="${LEGO_VERSION}"
          N="${NGINX_VERSION}"
          R="${REVISION}"
          {
            echo 'value<<EOF'
            [ -n "$R" ] && echo "${BASE}:lego${L}-nginx${N}-r${R}"
            echo "${BASE}:lego${L}-nginx${N}"
            echo "${BASE}:lego${L}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build and push all Debian images
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: |
            linux/amd64
            linux/386
            linux/arm64
            linux/arm/v7
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.tags.outputs.value }}

  docker_buildx_alpine:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run Docker on tmpfs
        uses: JonasAlfredsson/docker-on-tmpfs@v2.0.0
        with:
          tmpfs_size: 7
          swap_size: 9

      - name: Perform setup steps
        uses: JonasAlfredsson/checkout-qemu-buildx@v2.0.0
        with:
          should_login: ${{ github.event_name != 'pull_request' }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version numbers from GitHub reference
        run: bash .github/version_extractor.sh ${GITHUB_REF} >> $GITHUB_ENV

      - name: Compute Alpine tags
        id: tags
        run: |
          BASE="emulator/docker-nginx-lego"
          L="${LEGO_VERSION}"
          N="${NGINX_VERSION}"
          R="${REVISION}"
          {
            echo 'value<<EOF'
            [ -n "$R" ] && echo "${BASE}:lego${L}-nginx${N}-r${R}-alpine"
            echo "${BASE}:lego${L}-nginx${N}-alpine"
            echo "${BASE}:lego${L}-alpine"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build and push all Alpine images
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./src
          file: ./src/Dockerfile-alpine
          platforms: |
            linux/amd64
            linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.tags.outputs.value }}
