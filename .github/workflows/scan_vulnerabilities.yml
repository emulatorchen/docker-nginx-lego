name: "scan-vulnerabilities"

on:
  schedule:
    - cron: "0 23 * * 0"    # Sunday 23:00 UTC — before Monday's version bumpers
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  scan:
    name: "Scan ${{ matrix.variant }} image"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            dockerfile: src/Dockerfile
          - variant: alpine
            dockerfile: src/Dockerfile-alpine
          - variant: ubuntu
            dockerfile: src/Dockerfile-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build ${{ matrix.variant }} image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: src
          file: ${{ matrix.dockerfile }}
          push: false
          tags: scan-target:${{ matrix.variant }}

      - name: Install Trivy v0.69.3
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c "trivy_${TRIVY_VERSION}_checksums.txt"
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy_*

      - name: Scan ${{ matrix.variant }} image (JSON)
        run: |
          trivy image \
            --format json \
            --output trivy-${{ matrix.variant }}.json \
            --ignorefile .trivyignore \
            scan-target:${{ matrix.variant }}

      - name: Scan ${{ matrix.variant }} image (SARIF)
        if: always()
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.variant }}.sarif \
            --ignorefile .trivyignore \
            scan-target:${{ matrix.variant }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c # v4.34.1
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-${{ matrix.variant }}
          path: trivy-${{ matrix.variant }}.json
          retention-days: 7

  triage:
    name: "Triage CVEs and create/update GitHub Issues"
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: trivy-*
          merge-multiple: true

      - name: Triage CVEs and create/update issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Collect all unique CRITICAL/HIGH CVE IDs across all three images using jq
          ALL_CVES=$(for VARIANT in debian alpine ubuntu; do
            [ -f "trivy-${VARIANT}.json" ] || continue
            jq -r '.Results[]?.Vulnerabilities[]? |
              select(.Severity == "CRITICAL" or .Severity == "HIGH") |
              .VulnerabilityID' "trivy-${VARIANT}.json"
          done | sort -u)

          # Get open issues and PRs — needed for cleanup regardless of current CVE state
          OPEN_ISSUES=$(gh issue list --repo "$REPO" --label security \
            --state open --json number,title --limit 100 2>/dev/null || echo "[]")
          OPEN_PRS=$(gh pr list --repo "$REPO" --label security \
            --state open --json number,body --limit 100 2>/dev/null || echo "[]")

          # Close issues for CVEs no longer detected
          echo "$OPEN_ISSUES" | jq -r '.[].title' | grep -oE 'CVE-[0-9]+-[0-9]+' | sort -u | \
          while read -r CVE_ID; do
            [ -z "$CVE_ID" ] && continue
            echo "$ALL_CVES" | grep -qx "$CVE_ID" && continue
            ISSUE_NUM=$(echo "$OPEN_ISSUES" | jq -r --arg cve "$CVE_ID" \
              '.[] | select(.title | contains($cve)) | .number' | head -1)
            [ -n "$ISSUE_NUM" ] && \
              gh issue close "$ISSUE_NUM" --repo "$REPO" \
                --comment "Resolved — ${CVE_ID} no longer detected in weekly scan (${TODAY})."
          done

          # Close auto-fix PRs where all CVEs in the PR body are resolved
          echo "$OPEN_PRS" | jq -c '.[]' | while read -r PR_JSON; do
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            PR_BODY=$(echo "$PR_JSON" | jq -r '.body // ""')
            PR_CVES=$(echo "$PR_BODY" | grep -oE 'CVE-[0-9]+-[0-9]+' | sort -u)
            [ -z "$PR_CVES" ] && continue
            ALL_RESOLVED=true
            while read -r PR_CVE; do
              [ -z "$PR_CVE" ] && continue
              echo "$ALL_CVES" | grep -qx "$PR_CVE" && { ALL_RESOLVED=false; break; }
            done <<< "$PR_CVES"
            $ALL_RESOLVED && \
              gh pr close "$PR_NUM" --repo "$REPO" \
                --comment "All CVEs in this PR are resolved — closing automatically (${TODAY})."
          done

          if [ -z "$ALL_CVES" ]; then
            echo "No CRITICAL/HIGH CVEs found across all images."
            exit 0
          fi

          # Refresh open issues list after potential closes above
          OPEN_ISSUES=$(gh issue list --repo "$REPO" --label security \
            --state open --json number,title --limit 100 2>/dev/null || echo "[]")

          echo "$ALL_CVES" | while read -r CVE_ID; do
            [ -z "$CVE_ID" ] && continue

            SEVERITY=""
            PKG=""
            AFFECTED_VARIANTS=""
            FIX_MAP=""
            ALL_SAME_FIX=true
            LAST_FIXED=""
            FIRST_FIXED=true

            for VARIANT in debian alpine ubuntu; do
              [ -f "trivy-${VARIANT}.json" ] || continue
              ROW=$(jq -r --arg cve "$CVE_ID" '
                .Results[]?.Vulnerabilities[]? |
                select(.VulnerabilityID == $cve and (.Severity == "CRITICAL" or .Severity == "HIGH")) |
                "\(.Severity)\t\(.PkgName)\t\(.FixedVersion // "unknown")"
              ' "trivy-${VARIANT}.json" | head -1)
              [ -z "$ROW" ] && continue
              SEV=$(echo "$ROW" | cut -f1)
              PKG=$(echo "$ROW" | cut -f2)
              FIXED=$(echo "$ROW" | cut -f3)
              SEVERITY="$SEV"
              AFFECTED_VARIANTS="${AFFECTED_VARIANTS} ${VARIANT}"
              FIX_MAP="${FIX_MAP}\n- ${VARIANT}: \`${FIXED}\`"
              if $FIRST_FIXED; then
                LAST_FIXED="$FIXED"
                FIRST_FIXED=false
              elif [ "$FIXED" != "$LAST_FIXED" ]; then
                ALL_SAME_FIX=false
              fi
            done

            [ -z "$AFFECTED_VARIANTS" ] && continue

            LABELS="security,severity:$(echo "$SEVERITY" | tr '[:upper:]' '[:lower:]')"
            echo "$FIX_MAP" | grep -q "unknown" && LABELS="${LABELS},no-fix-available"
            $ALL_SAME_FIX || LABELS="${LABELS},needs-manual-review"

            EXISTING=$(echo "$OPEN_ISSUES" | jq -r --arg cve "$CVE_ID" \
              '.[] | select(.title | contains($cve)) | .number' | head -1)

            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --repo "$REPO" \
                --body "Still detected in weekly scan (${TODAY}).
          Affected images:${AFFECTED_VARIANTS}
          $(printf '%b' "$FIX_MAP")"
            else
              TITLE="[SECURITY] ${CVE_ID}: ${PKG} (${SEVERITY})"
              BODY="**CVE:** ${CVE_ID}
          **Severity:** ${SEVERITY}
          **Package:** ${PKG}
          **First detected:** ${TODAY}
          **Affected images:**${AFFECTED_VARIANTS}

          **Fix versions:**
          $(printf '%b' "$FIX_MAP")

          To suppress after analysis: add to \`.trivyignore\`:
          \`\`\`
          ${CVE_ID}  # reason accepted
          \`\`\`"
              gh issue create --repo "$REPO" \
                --title "$TITLE" \
                --body "$BODY" \
                --label "$LABELS"
            fi
          done

  auto_fix:
    name: "Open auto-fix PR for fixable CVEs"
    needs: triage
    if: always() && needs.triage.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CVE_AUTOFIX_TOKEN }}

      - name: Set up QEMU for multi-arch pin verification
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: trivy-*
          merge-multiple: true

      - name: Create auto-fix PR if applicable
        env:
          GH_TOKEN: ${{ secrets.CVE_AUTOFIX_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Conditions for auto-fix PR (all must be true):
          # 1. CVE severity is HIGH or CRITICAL
          # 2. A fixed version exists (not "unknown") on at least one affected image
          # 3. Fix maps to a known mechanism:
          #    - nginx package CVE          → bump FROM nginx:<ver> in Dockerfiles
          #    - lego package CVE           → bump ARG LEGO_VERSION= in Dockerfiles
          #    - gobinary CVE in lego path  → bump ARG LEGO_VERSION= to latest release
          #    - OS package CVE (os-pkgs)   → pin package version in a dedicated RUN layer
          # 4. CVE not already covered by an open security PR

          TODAY=$(date +%Y-%m-%d)
          BRANCH="fix/cve-${TODAY}"

          # Check if fix branch already exists
          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            echo "Auto-fix branch ${BRANCH} already exists — skipping."
            exit 0
          fi

          # CVE IDs already covered by open security PRs (dedup across scan cycles)
          COVERED_CVES=$(gh pr list --repo "$REPO" --label security --state open \
            --json body --limit 100 2>/dev/null \
            | jq -r '.[].body // ""' | grep -oE 'CVE-[0-9]+-[0-9]+' | sort -u || true)

          FIXABLE_NGINX=""
          FIXABLE_LEGO=""
          FIXABLE_OS_ITEMS=""
          OS_FIXES_DEB=""
          OS_FIXES_APK=""
          OS_FIXES_UBU=""
          OS_CVE_MAP_DEB=""
          OS_CVE_MAP_APK=""
          OS_CVE_MAP_UBU=""
          LEGO_TRANSITIVE_CVES=""

          for VARIANT in debian alpine ubuntu; do
            [ -f "trivy-${VARIANT}.json" ] || continue

            # nginx / lego direct CVEs
            while IFS=$'\t' read -r CVE_ID PKG FIXED; do
              [ -z "$CVE_ID" ] && continue
              echo "$COVERED_CVES" | grep -qx "$CVE_ID" && continue
              case "$PKG" in
                nginx*) FIXABLE_NGINX="${FIXABLE_NGINX} ${CVE_ID}(${FIXED})" ;;
                lego*)  FIXABLE_LEGO="${FIXABLE_LEGO} ${CVE_ID}(${FIXED})" ;;
              esac
            done < <(jq -r '
              .Results[]?.Vulnerabilities[]? |
              select(
                (.Severity == "CRITICAL" or .Severity == "HIGH") and
                ((.FixedVersion // "") != "") and .FixedVersion != "unknown"
              ) |
              "\(.VulnerabilityID)\t\(.PkgName)\t\(.FixedVersion)"
            ' "trivy-${VARIANT}.json" | sort -u)

            # OS package CVEs (class: os-pkgs) — pin version in Dockerfile.
            # No COVERED_CVES dedup: OS_FIXES_* must always reflect the full current
            # scan state so stale pins are removed when a base image ships the fix.
            while IFS=$'\t' read -r CVE_ID PKG FIXED; do
              [ -z "$CVE_ID" ] && continue
              case "$PKG" in nginx*|lego*) continue ;; esac
              FIXABLE_OS_ITEMS="${FIXABLE_OS_ITEMS} ${CVE_ID}(${PKG}@${VARIANT}=${FIXED})"
              case "$VARIANT" in
                debian)
                  OS_FIXES_DEB="${OS_FIXES_DEB} ${PKG}=${FIXED}"
                  OS_CVE_MAP_DEB="${OS_CVE_MAP_DEB} ${CVE_ID}:${PKG}=${FIXED}" ;;
                alpine)
                  OS_FIXES_APK="${OS_FIXES_APK} ${PKG}=${FIXED}"
                  OS_CVE_MAP_APK="${OS_CVE_MAP_APK} ${CVE_ID}:${PKG}=${FIXED}" ;;
                ubuntu)
                  OS_FIXES_UBU="${OS_FIXES_UBU} ${PKG}=${FIXED}"
                  OS_CVE_MAP_UBU="${OS_CVE_MAP_UBU} ${CVE_ID}:${PKG}=${FIXED}" ;;
              esac
            done < <(jq -r '
              .Results[]? |
              select(.Class == "os-pkgs") |
              .Vulnerabilities[]? |
              select(
                (.Severity == "CRITICAL" or .Severity == "HIGH") and
                ((.FixedVersion // "") != "") and .FixedVersion != "unknown"
              ) |
              "\(.VulnerabilityID)\t\(.PkgName)\t\(.FixedVersion)"
            ' "trivy-${VARIANT}.json" | sort -u)

            # Lego transitive CVEs — Go modules inside the lego binary (gobinary)
            while IFS=$'\t' read -r CVE_ID PKG FIXED; do
              [ -z "$CVE_ID" ] && continue
              echo "$COVERED_CVES" | grep -qx "$CVE_ID" && continue
              echo "$LEGO_TRANSITIVE_CVES" | grep -qw "$CVE_ID" && continue
              LEGO_TRANSITIVE_CVES="${LEGO_TRANSITIVE_CVES} ${CVE_ID}"
            done < <(jq -r '
              .Results[]? |
              select(.Type == "gobinary" and (.Target | test("lego"; "i"))) |
              .Vulnerabilities[]? |
              select(.Severity == "CRITICAL" or .Severity == "HIGH") |
              "\(.VulnerabilityID)\t\(.PkgName)\t\(.FixedVersion // "unknown")"
            ' "trivy-${VARIANT}.json" | sort -u)
          done

          # Detect whether existing pin blocks need cleanup (CVE resolved in base image).
          # Checked here so we know to proceed even when no *new* CVEs are found.
          NEEDS_CLEANUP=false
          [ -z "$OS_FIXES_DEB" ] && \
            grep -q "CVE security pins" src/Dockerfile 2>/dev/null && NEEDS_CLEANUP=true
          [ -z "$OS_FIXES_APK" ] && \
            grep -q "CVE security pins" src/Dockerfile-alpine 2>/dev/null && NEEDS_CLEANUP=true
          [ -z "$OS_FIXES_UBU" ] && \
            grep -q "CVE security pins" src/Dockerfile-ubuntu 2>/dev/null && NEEDS_CLEANUP=true

          if [ -z "$FIXABLE_NGINX" ] && [ -z "$FIXABLE_LEGO" ] && \
             [ -z "$FIXABLE_OS_ITEMS" ] && [ -z "$LEGO_TRANSITIVE_CVES" ] && \
             ! $NEEDS_CLEANUP; then
            echo "No auto-fixable CVEs found — no PR created."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          # Write or remove the CVE security pins block.
          # Empty FIXES removes the block (base image shipped the fix natively).
          write_os_pins() {
            local DOCKERFILE="$1" PM="$2" FIXES="$3"
            if [ -z "$FIXES" ]; then
              grep -q "CVE security pins" "$DOCKERFILE" 2>/dev/null || return
              awk '/# --- CVE security pins \(auto-managed\)/{skip=1} /# --- end CVE security pins ---/{skip=0;next} !skip{print}' \
                "$DOCKERFILE" > "${DOCKERFILE}.tmp" && mv "${DOCKERFILE}.tmp" "$DOCKERFILE"
              return
            fi
            local PKGS_FILE
            PKGS_FILE=$(mktemp)
            echo "$FIXES" | tr ' ' '\n' | grep -v '^$' | sort -u > "$PKGS_FILE"
            awk '/# --- CVE security pins \(auto-managed\)/{skip=1} /# --- end CVE security pins ---/{skip=0;next} !skip{print}' \
              "$DOCKERFILE" > "${DOCKERFILE}.tmp"
            if [ "$PM" = "apt" ]; then
              awk -v pf="$PKGS_FILE" '
                /^VOLUME/ {
                  print "# --- CVE security pins (auto-managed) ---"
                  print "RUN apt-get update && apt-get install -y --no-install-recommends \\"
                  while ((getline line < pf) > 0) printf "    %s \\\n", line
                  print "    && rm -rf /var/lib/apt/lists/*"
                  print "# --- end CVE security pins ---"
                  print ""
                }
                { print }
              ' "${DOCKERFILE}.tmp" > "$DOCKERFILE"
            else
              awk -v pf="$PKGS_FILE" '
                /^VOLUME/ {
                  printf "# --- CVE security pins (auto-managed) ---\nRUN apk add --no-cache"
                  while ((getline line < pf) > 0) printf " %s", line
                  printf "\n# --- end CVE security pins ---\n\n"
                }
                { print }
              ' "${DOCKERFILE}.tmp" > "$DOCKERFILE"
            fi
            rm -f "${DOCKERFILE}.tmp" "$PKGS_FILE"
          }

          # For each pending package, test-build a minimal image for all target platforms.
          # Passes only verified packages; records failures in FAIL_DIR (one file per CVE+pkg).
          # File name: <CVE>___<pkg=ver>, contents: line 1 = platforms, rest = build error.
          verify_and_filter_pins() {
            local DOCKERFILE="$1" PM="$2" FIXES="$3" CVE_MAP="$4" FAIL_DIR="$5"
            [ -z "$FIXES" ] && return
            local BASE_IMG PLATFORMS
            BASE_IMG=$(grep '^FROM ' "$DOCKERFILE" | head -1 | awk '{print $2}')
            case "$DOCKERFILE" in
              *Dockerfile-alpine) PLATFORMS="linux/amd64,linux/arm64" ;;
              *Dockerfile-ubuntu) PLATFORMS="linux/amd64,linux/arm64" ;;
              *)                  PLATFORMS="linux/amd64,linux/386,linux/arm64,linux/arm/v7" ;;
            esac
            local VERIFIED=""
            for PKG_VER in $(echo "$FIXES" | tr ' ' '\n' | grep -v '^$' | sort -u); do
              local TEST_DIR BUILD_LOG BUILD_OK
              TEST_DIR=$(mktemp -d)
              if [ "$PM" = "apt" ]; then
                {
                  echo "FROM ${BASE_IMG}"
                  echo "RUN apt-get update && apt-get install -y --no-install-recommends ${PKG_VER} && rm -rf /var/lib/apt/lists/*"
                } > "${TEST_DIR}/Dockerfile"
              else
                {
                  echo "FROM ${BASE_IMG}"
                  echo "RUN apk add --no-cache ${PKG_VER}"
                } > "${TEST_DIR}/Dockerfile"
              fi
              set +e
              BUILD_LOG=$(docker buildx build --platform "$PLATFORMS" "${TEST_DIR}" 2>&1)
              BUILD_OK=$?
              set -e
              rm -rf "$TEST_DIR"
              if [ "$BUILD_OK" -eq 0 ]; then
                VERIFIED="${VERIFIED} ${PKG_VER}"
              else
                local PKG_NAME CVE_FOR_PKG
                PKG_NAME=$(echo "$PKG_VER" | cut -d= -f1)
                CVE_FOR_PKG=$(echo "$CVE_MAP" | tr ' ' '\n' | grep ":${PKG_NAME}=" | cut -d: -f1 | head -1)
                {
                  echo "$PLATFORMS"
                  echo "$BUILD_LOG" | tail -10
                } > "${FAIL_DIR}/${CVE_FOR_PKG}___${PKG_VER}"
              fi
            done
            echo "$VERIFIED"
          }

          FAIL_DIR=$(mktemp -d)
          VERIFIED_DEB=$(verify_and_filter_pins "src/Dockerfile"        "apt" "$OS_FIXES_DEB" "$OS_CVE_MAP_DEB" "$FAIL_DIR")
          VERIFIED_APK=$(verify_and_filter_pins "src/Dockerfile-alpine" "apk" "$OS_FIXES_APK" "$OS_CVE_MAP_APK" "$FAIL_DIR")
          VERIFIED_UBU=$(verify_and_filter_pins "src/Dockerfile-ubuntu" "apt" "$OS_FIXES_UBU" "$OS_CVE_MAP_UBU" "$FAIL_DIR")

          write_os_pins "src/Dockerfile"        "apt" "$VERIFIED_DEB"
          write_os_pins "src/Dockerfile-alpine" "apk" "$VERIFIED_APK"
          write_os_pins "src/Dockerfile-ubuntu" "apt" "$VERIFIED_UBU"

          # Post issue comments for packages that failed multi-arch verification
          OPEN_ISSUES_PINS=$(gh issue list --repo "$REPO" --label security \
            --state open --json number,title --limit 100 2>/dev/null || echo "[]")
          for FAIL_FILE in "$FAIL_DIR"/*; do
            [ -f "$FAIL_FILE" ] || continue
            BASENAME=$(basename "$FAIL_FILE")
            FAIL_CVE=${BASENAME%%___*}
            FAIL_PKG=${BASENAME##*___}
            FAIL_PLATFORMS=$(head -1 "$FAIL_FILE")
            FAIL_MSG=$(tail -n +2 "$FAIL_FILE")
            [ -z "$FAIL_CVE" ] && continue
            ISSUE_NUM=$(echo "$OPEN_ISSUES_PINS" | jq -r --arg cve "$FAIL_CVE" \
              '.[] | select(.title | contains($cve)) | .number' | head -1)
            [ -z "$ISSUE_NUM" ] && continue
            COMMENT=$(printf '**Auto-fix blocked for `%s`:** package not available on all target platforms (`%s`) — pin skipped for this image variant.\n```\n%s\n```' \
              "$FAIL_PKG" "$FAIL_PLATFORMS" "$FAIL_MSG")
            gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$COMMENT"
          done
          rm -rf "$FAIL_DIR"

          # Bump nginx FROM version if nginx package CVEs found
          if [ -n "$FIXABLE_NGINX" ]; then
            RAW_VER=$(echo "$FIXABLE_NGINX" | grep -oE '\([^)]+\)' | head -1 | tr -d '()')
            NGINX_VER=$(echo "$RAW_VER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
            if [ -n "$NGINX_VER" ]; then
              sed -i "s|^FROM nginx:[^ ]*|FROM nginx:${NGINX_VER}|" src/Dockerfile
              sed -i "s|^FROM nginx:[^ ]*-alpine[^ ]*|FROM nginx:${NGINX_VER}-alpine|" \
                src/Dockerfile-alpine
            fi
          fi

          # Bump lego ARG version for direct lego CVEs or transitive gobinary CVEs.
          # For transitive CVEs the fix version is a Go module version, not a lego version;
          # the only automated fix is upgrading lego itself to pick up the patched dependency.
          LEGO_NOTE=""
          if [ -n "$FIXABLE_LEGO" ] || [ -n "$LEGO_TRANSITIVE_CVES" ]; then
            LATEST_LEGO=$(curl -sf "https://api.github.com/repos/go-acme/lego/releases/latest" \
              | jq -r '.tag_name' | sed 's/^v//')
            CURRENT_LEGO=$(grep -m1 '^ARG LEGO_VERSION=' src/Dockerfile \
              | sed 's/ARG LEGO_VERSION=//')
            if [ -n "$LATEST_LEGO" ] && [ "$LATEST_LEGO" != "$CURRENT_LEGO" ]; then
              sed -i "s/^ARG LEGO_VERSION=.*/ARG LEGO_VERSION=${LATEST_LEGO}/" \
                src/Dockerfile src/Dockerfile-alpine src/Dockerfile-ubuntu
              LEGO_NOTE="Bumped lego ${CURRENT_LEGO} → ${LATEST_LEGO}"
            else
              LEGO_NOTE="lego already at latest (${CURRENT_LEGO:-unknown}); transitive CVEs require an upstream lego release"
              # Comment on each affected issue so it's clear why no auto-fix was applied
              if [ -n "$LEGO_TRANSITIVE_CVES" ]; then
                OPEN_ISSUES_AF=$(gh issue list --repo "$REPO" --label security \
                  --state open --json number,title --limit 100 2>/dev/null || echo "[]")
                for TR_CVE in $LEGO_TRANSITIVE_CVES; do
                  TR_ISSUE=$(echo "$OPEN_ISSUES_AF" | jq -r --arg cve "$TR_CVE" \
                    '.[] | select(.title | contains($cve)) | .number' | head -1)
                  [ -z "$TR_ISSUE" ] && continue
                  gh issue comment "$TR_ISSUE" --repo "$REPO" --body \
                    "**Auto-fix blocked:** ${TR_CVE} is in a Go module inside the lego binary (not an OS package). The only fix is a lego release that vendors the patched dependency. Lego is already at the latest release (\`${CURRENT_LEGO}\`) which still includes the vulnerable version. No action possible until lego upstream publishes a fix."
                done
              fi
            fi
          fi

          # Only create a PR if there are actual Dockerfile changes
          git add src/Dockerfile src/Dockerfile-alpine src/Dockerfile-ubuntu
          if git diff --cached --quiet; then
            echo "No Dockerfile changes to commit — skipping PR."
            exit 0
          fi
          git commit -m "fix: auto-fix CVEs from vulnerability scan (${TODAY})"
          git push origin "$BRANCH"

          PR_BODY="Auto-fix PR for CVEs detected in weekly vulnerability scan (${TODAY})."
          [ -n "$FIXABLE_NGINX" ] && PR_BODY="${PR_BODY}

          **nginx CVEs fixed:** ${FIXABLE_NGINX}"
          [ -n "$FIXABLE_LEGO" ] && PR_BODY="${PR_BODY}

          **lego CVEs fixed:** ${FIXABLE_LEGO}"
          [ -n "$LEGO_TRANSITIVE_CVES" ] && PR_BODY="${PR_BODY}

          **lego transitive CVEs (gobinary):** ${LEGO_NOTE}"
          [ -n "$FIXABLE_OS_ITEMS" ] && PR_BODY="${PR_BODY}

          **OS package CVEs pinned:** ${FIXABLE_OS_ITEMS}
          Fix versions differ by package manager (apt vs apk) — each variant pinned to its own version."
          $NEEDS_CLEANUP && PR_BODY="${PR_BODY}

          **Stale OS package pins removed:** base image update resolved the CVE natively — hardcoded version pins are no longer needed."

          gh pr create \
            --title "fix: auto-fix CVEs from vulnerability scan (${TODAY})" \
            --body "$PR_BODY" \
            --base master \
            --label security
